    ::-webkit-scrollbar { width: 6px; height: 6px; }

    .badge-c { background: #10B98122; color: #10B981; border: 1px solid #10B98144; }

    .progress-bar { height: 6px; border-radius: 3px; background: #1E2D4A; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

/* ─── HELPERS ─────────────────────────────────────────────── */
const statusColor   = { Critical:"#EF4444", Warning:"#F59E0B", OK:"#10B981", Excess:"#8B5CF6" };
const severityColor = { High:"#EF4444", Medium:"#F59E0B", Low:"#6B7280" };
const exStatusColor = { Open:"#EF4444", "In Review":"#F59E0B", Resolved:"#10B981" };

function computeABC(items) {
  const withValue = items.map(i => ({ ...i, annualValue: i.annualUsage * i.unitCost }));
  const total = withValue.reduce((s, i) => s + i.annualValue, 0);
  const sorted = [...withValue].sort((a, b) => b.annualValue - a.annualValue);
  let cumulative = 0;
  return sorted.map(item => {
    cumulative += item.annualValue;
    const pct = cumulative / total;
    const category = pct <= 0.80 ? "A" : pct <= 0.95 ? "B" : "C";
    return { ...item, category, annualValuePct: (item.annualValue / total) * 100 };
  });
}

function fmt(n) { return n.toLocaleString("en-IN", { maximumFractionDigits: 0 }); }
function fmtCurr(n) { return "₹" + fmt(n); }

/* ─── BAR CHART ───────────────────────────────────────────── */
function BarChart({ data }) {
  const maxVal = Math.max(...data.flatMap(d => [d.demand, d.supply, d.inventory]));
  return (
    <div style={{ display:"flex", alignItems:"flex-end", gap:"6px", height:"120px", padding:"0 4px" }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:"2px" }}>
          <div style={{ display:"flex", alignItems:"flex-end", gap:"2px", height:"100px" }}>
            <div style={{ width:"8px", height:`${(d.demand/maxVal)*100}px`, background:"#3B82F6", borderRadius:"2px 2px 0 0" }} />
            <div style={{ width:"8px", height:`${(d.supply/maxVal)*100}px`, background:"#10B981", borderRadius:"2px 2px 0 0" }} />
            <div style={{ width:"8px", height:`${(d.inventory/maxVal)*100}px`, background:"#F59E0B", borderRadius:"2px 2px 0 0" }} />
          </div>
          <span style={{ fontSize:"9px", color:"#64748B" }}>{d.week}</span>
        </div>
      ))}
    </div>
  );
}

/* ─── SME SCENARIO TAB ────────────────────────────────────── */
function SMEScenarioTab() {
  const [selected, setSelected] = useState(0);
  const [paramValues, setParamValues] = useState({});
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);

  const sc = mockData.smeScenarios[selected];

  const getParam = (key, defaultVal) => paramValues[`${sc.id}_${key}`] ?? defaultVal;
  const setParam = (key, val) => setParamValues(p => ({ ...p, [`${sc.id}_${key}`]: Number(val) }));

  const tagColor = { Demand:"#3B82F6", Cost:"#EF4444", Risk:"#F59E0B", Growth:"#10B981" };

  const runScenario = () => {
    setRunning(true);
    setTimeout(() => {
      const { baselineSales, baselineStock, baselineCost } = sc;
      let adjSales = baselineSales;
      let adjCost  = baselineCost;
      let adjStock = baselineStock;
      let notes    = [];

      if (sc.id === "S1") {
        const di = getParam("demandIncrease", 30);
        const lt = getParam("leadTimeChange", 5);
        const lb = getParam("laborScale", 20);
        adjSales = baselineSales * (1 + di / 100);
        adjCost  = baselineCost * (1 + (lb / 100) * 0.4);
        adjStock = baselineStock * (1 + (lt / 10) * 0.15);
        notes = [
          `Revenue opportunity: ${fmtCurr((adjSales - baselineSales) / 1000)}K`,
          `Lead time adds ${lt}d — reorder early to avoid stockout`,
          `Labor cost impact: +${fmtCurr((adjCost - baselineCost) / 1000)}K`,
        ];
      } else if (sc.id === "S2") {
        const ci = getParam("costIncrease", 15);
        const ap = getParam("altSupplier", 8);
        const pt = getParam("passThrough", 50);
        const rawCostHike = baselineCost * (ci / 100);
        adjCost  = baselineCost + rawCostHike * (1 - ap / 100);
        adjSales = baselineSales * (1 + (ci * pt) / 10000);
        adjStock = baselineStock;
        notes = [
          `Margin erosion if not passed through: ${fmtCurr(rawCostHike / 1000)}K`,
          `Alt supplier saves ~${fmtCurr((rawCostHike * ap / 100) / 1000)}K`,
          `Price pass-through at ${pt}% recovers ${fmtCurr(((adjSales - baselineSales)) / 1000)}K`,
        ];
      } else if (sc.id === "S3") {
        const dd = getParam("downDays", 7);
        const rc = getParam("repairCost", 80) * 1000;
        const op = getParam("outsourcePct", 40);
        const lostProd = (baselineSales / 365) * dd;
        const outsourceRecov = lostProd * (op / 100) * 1.12;
        adjSales = baselineSales - lostProd + outsourceRecov;
        adjCost  = baselineCost + rc + lostProd * (op / 100) * 0.12;
        adjStock = baselineStock - lostProd * 0.3;
        notes = [
          `Lost production value: ${fmtCurr(lostProd / 1000)}K`,
          `Outsourcing recovers ${fmtCurr(outsourceRecov / 1000)}K at 12% premium`,
          `Repair + outsource cost: ${fmtCurr((rc + lostProd * (op / 100) * 0.12) / 1000)}K`,
        ];
      } else if (sc.id === "S4") {
        const ms = getParam("marketSize", 300) * 1000;
        const ib = getParam("inventoryBuild", 80) * 1000;
        const lc = getParam("logisticsCost", 40) * 1000;
        adjSales = baselineSales + ms;
        adjCost  = baselineCost + lc + ib * 0.2;
        adjStock = baselineStock + ib;
        notes = [
          `New market revenue: +${fmtCurr(ms / 1000)}K`,
          `Working capital needed: ${fmtCurr(ib / 1000)}K (inventory build)`,
          `Net profit impact: +${fmtCurr((ms - lc - ib * 0.2) / 1000)}K`,
        ];
      }

      const netMarginBase = ((baselineSales - baselineCost) / baselineSales) * 100;
      const netMarginAdj  = ((adjSales - adjCost) / adjSales) * 100;

      setResult({ adjSales, adjCost, adjStock, notes, netMarginBase, netMarginAdj,
        deltaRevenue: adjSales - baselineSales,
        deltaCost: adjCost - baselineCost,
        deltaMargin: netMarginAdj - netMarginBase,
      });
      setRunning(false);
    }, 900);
  };

  return (
    <div className="tab-content">
      <div style={{ marginBottom:"18px" }}>
        <h2 style={{ fontSize:"18px", fontWeight:"800", color:"#F1F5F9", marginBottom:"4px" }}>SME Scenario Planning</h2>
        <p style={{ fontSize:"12px", color:"#64748B" }}>Simulate real-world supply chain disruptions & growth events for small & medium industries</p>
      </div>

      {/* Scenario Cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))", gap:"12px", marginBottom:"20px" }}>
        {mockData.smeScenarios.map((s, i) => (
          <div key={s.id} className="scenario-card"
            onClick={() => { setSelected(i); setResult(null); }}
            style={{ background:"#161B2E", border:`2px solid ${selected===i?"#3B82F6":"#1E2D4A"}`, borderRadius:"12px", padding:"16px", cursor:"pointer",
              boxShadow: selected===i ? "0 0 0 1px #3B82F640, 0 4px 20px #3B82F620" : "none", transition:"all 0.2s" }}>
            <div style={{ fontSize:"28px", marginBottom:"8px" }}>{s.icon}</div>
            <div style={{ display:"flex", alignItems:"center", gap:"7px", marginBottom:"6px" }}>
              <div style={{ fontSize:"13px", fontWeight:"800", color:"#E2E8F0" }}>{s.name}</div>
            </div>
            <span style={{ fontSize:"9px", fontWeight:"700", padding:"2px 7px", borderRadius:"4px",
              background:`${tagColor[s.tag]}22`, color:tagColor[s.tag], border:`1px solid ${tagColor[s.tag]}44` }}>{s.tag}</span>
            <p style={{ fontSize:"11px", color:"#64748B", marginTop:"8px", lineHeight:"1.5" }}>{s.description}</p>
          </div>
        ))}
      </div>

      {/* Parameter Sliders */}
      <div style={{ background:"#161B2E", border:"1px solid #1E2D4A", borderRadius:"12px", padding:"20px", marginBottom:"16px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
          <h3 style={{ fontSize:"14px", fontWeight:"700", color:"#E2E8F0" }}>
            {sc.icon} Configure: {sc.name}
          </h3>
          <button onClick={runScenario} disabled={running}
            style={{ background: running ? "#1E2D4A" : "linear-gradient(135deg,#3B82F6,#1D4ED8)", border:"none", color:"#fff",
              padding:"9px 20px", borderRadius:"8px", cursor: running ? "not-allowed" : "pointer", fontSize:"13px", fontWeight:"700",
              opacity: running ? 0.7 : 1 }}>
            {running ? "⏳ Running..." : "▶ Run Scenario"}
          </button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))", gap:"20px" }}>
          {sc.params.map(p => {
            const val = getParam(p.key, p.default);
            return (
              <div key={p.key}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"8px" }}>
                  <span style={{ fontSize:"12px", color:"#94A3B8", fontWeight:"600" }}>{p.label}</span>
                  <span style={{ fontSize:"13px", color:"#60A5FA", fontWeight:"800" }}>{val}</span>
                </div>
                <input type="range" min={p.min} max={p.max} value={val}
                  onChange={e => setParam(p.key, e.target.value)}
                  style={{ width:"100%", accentColor:"#3B82F6", cursor:"pointer" }} />
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:"9px", color:"#475569", marginTop:"3px" }}>
                  <span>{p.min}</span><span>{p.max}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Results */}
      {result && (
        <div style={{ animation:"fadeIn 0.3s ease" }}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))", gap:"10px", marginBottom:"14px" }}>
            {[
              { label:"Projected Revenue", value:fmtCurr(result.adjSales/1000)+"K",
                delta: result.deltaRevenue >= 0 ? `+${fmtCurr(result.deltaRevenue/1000)}K` : fmtCurr(result.deltaRevenue/1000)+"K",
                positive: result.deltaRevenue >= 0 },
              { label:"Total Cost", value:fmtCurr(result.adjCost/1000)+"K",
                delta: result.deltaCost >= 0 ? `+${fmtCurr(result.deltaCost/1000)}K` : fmtCurr(result.deltaCost/1000)+"K",
                positive: result.deltaCost <= 0 },
              { label:"Inventory Position", value:fmtCurr(result.adjStock/1000)+"K",
                delta:"Adjusted", positive:true },
              { label:"Net Margin", value:result.netMarginAdj.toFixed(1)+"%",
                delta: result.deltaMargin >= 0 ? `+${result.deltaMargin.toFixed(1)}pp` : result.deltaMargin.toFixed(1)+"pp",
                positive: result.deltaMargin >= 0 },
            ].map((m, i) => (
              <div key={i} style={{ background:"#161B2E", border:"1px solid #1E2D4A", borderRadius:"10px", padding:"14px", position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", top:0, left:0, right:0, height:"3px",
                  background: m.positive ? "#10B981" : "#EF4444" }} />
                <div style={{ fontSize:"10px", color:"#64748B", fontWeight:"700", textTransform:"uppercase", marginBottom:"6px" }}>{m.label}</div>
                <div style={{ fontSize:"20px", fontWeight:"900", color:"#F1F5F9" }}>{m.value}</div>
                <div style={{ fontSize:"11px", color: m.positive ? "#10B981" : "#EF4444", marginTop:"4px", fontWeight:"700" }}>{m.delta}</div>
              </div>
            ))}
          </div>

          <div style={{ background:"#161B2E", border:"1px solid #1E2D4A", borderRadius:"10px", padding:"16px" }}>
            <h4 style={{ fontSize:"13px", fontWeight:"700", color:"#E2E8F0", marginBottom:"12px" }}>💡 Planner Insights</h4>
            <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
              {result.notes.map((n, i) => (
                <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:"10px", padding:"10px 12px",
                  background:"#0F1117", borderRadius:"8px", border:"1px solid #1E2D4A" }}>
                  <span style={{ color:"#3B82F6", fontSize:"14px", flexShrink:0 }}>→</span>
                  <span style={{ fontSize:"12px", color:"#CBD5E1", lineHeight:"1.5" }}>{n}</span>
                </div>
              ))}
            </div>

            {/* Margin comparison bar */}
            <div style={{ marginTop:"14px" }}>
              <div style={{ fontSize:"11px", color:"#64748B", marginBottom:"8px", fontWeight:"600" }}>Margin Comparison</div>
              <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                {[
                  { label:"Baseline", pct: result.netMarginBase, color:"#3B82F6" },
                  { label:"Scenario", pct: result.netMarginAdj,  color: result.deltaMargin >= 0 ? "#10B981" : "#EF4444" },
                ].map(b => (
                  <div key={b.label} style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                    <span style={{ fontSize:"11px", color:"#94A3B8", width:"60px" }}>{b.label}</span>
                    <div className="progress-bar" style={{ flex:1 }}>
                      <div className="progress-fill" style={{ width:`${Math.max(0,Math.min(100,b.pct*3))}%`, background:b.color }} />
                    </div>
                    <span style={{ fontSize:"12px", fontWeight:"700", color:b.color, width:"40px", textAlign:"right" }}>{b.pct.toFixed(1)}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {!result && !running && (
        <div style={{ textAlign:"center", padding:"30px", color:"#475569", fontSize:"13px" }}>

                      <td style={{ padding:"11px 14px", color:"#60A5FA", fontWeight:"700", fontFamily:"monospace" }}>{row.part}</td>
                      <td style={{ padding:"11px 14px", color:"#CBD5E1" }}>{row.description}</td>
                      <td style={{ padding:"11px 14px", color:"#94A3B8" }}>{row.site}</td>
                      <td style={{ padding:"11px 14px", color:"#E2E8F0", textAlign:"right" }}>{row.onHand.toLocaleString()}</td>
                      <td style={{ padding:"11px 14px", color:"#E2E8F0", textAlign:"right" }}>{row.onOrder.toLocaleString()}</td>
                      <td style={{ padding:"11px 14px", color:"#E2E8F0", textAlign:"right" }}>{row.demand.toLocaleString()}</td>
                      <td style={{ padding:"11px 14px", textAlign:"right", fontWeight:"800",
                        color: row.gap<0?"#EF4444":row.gap>1000?"#8B5CF6":"#10B981" }}>
                        {row.gap>0?"+":""}{row.gap.toLocaleString()}
                      </td>
                      <td style={{ padding:"11px 14px" }}>
                        <span style={{ fontSize:"11px", padding:"3px 8px", borderRadius:"4px",
                          background:`${statusColor[row.status]}22`, color:statusColor[row.status], fontWeight:"700" }}>{row.status}</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* EXCEPTIONS */}
        {activeTab === "exceptions" && (
          <div className="tab-content">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px", flexWrap:"wrap", gap:"10px" }}>
              <h2 style={{ margin:0, fontSize:"18px", fontWeight:"800", color:"#F1F5F9" }}>
                Exceptions Manager <span style={{ fontSize:"13px", color:"#64748B", fontWeight:"500" }}>({filteredExceptions.length} shown)</span>
              </h2>
              <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                  placeholder="Search exceptions..."
                  style={{ background:"#1E2D4A", border:"1px solid #2D3F5C", color:"#E2E8F0",
                    padding:"7px 12px", borderRadius:"6px", fontSize:"12px", outline:"none", width:"180px" }} />
                <select value={filterSeverity} onChange={e => setFilterSeverity(e.target.value)}
                  style={{ background:"#1E2D4A", border:"1px solid #2D3F5C", color:"#94A3B8",
                    padding:"7px 10px", borderRadius:"6px", fontSize:"12px" }}>
                  <option>All</option><option>High</option><option>Medium</option><option>Low</option>
                </select>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
              {filteredExceptions.map((ex, i) => (
                <div key={i} style={{ background:"#161B2E", border:`1px solid ${ex.severity==="High"?"#EF444433":"#1E2D4A"}`,
                  borderRadius:"10px", padding:"14px 16px", display:"flex", gap:"14px", alignItems:"flex-start" }}>
                  <div style={{ width:"4px", minHeight:"50px", borderRadius:"4px", background:severityColor[ex.severity], flexShrink:0 }} />
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:"10px" }}>
                      <div>
                        <div style={{ fontSize:"14px", fontWeight:"700", color:"#E2E8F0" }}>{ex.type}</div>
                        <div style={{ fontSize:"11px", color:"#64748B", marginTop:"3px" }}>{ex.id} · {ex.item} · {ex.site} · {ex.date}</div>
                      </div>
                      <div style={{ display:"flex", gap:"6px", alignItems:"center", flexShrink:0 }}>
                        <span style={{ fontSize:"10px", padding:"2px 7px", borderRadius:"4px",
                          background:`${severityColor[ex.severity]}22`, color:severityColor[ex.severity], fontWeight:"700" }}>{ex.severity}</span>
                        <span style={{ fontSize:"10px", padding:"2px 7px", borderRadius:"4px",
                          background:`${exStatusColor[ex.status]}22`, color:exStatusColor[ex.status], fontWeight:"700" }}>{ex.status}</span>
                      </div>
                    </div>
                    {ex.status !== "Resolved" && (
                      <button style={{ marginTop:"8px", background:"#1E2D4A", border:"1px solid #2D3F5C",
                        color:"#94A3B8", padding:"4px 14px", borderRadius:"4px", fontSize:"11px", cursor:"pointer", fontWeight:"600" }}>
                        Mark Resolved
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ORIGINAL SCENARIOS */}
        {activeTab === "scenarios" && (
          <div className="tab-content">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
              <h2 style={{ margin:0, fontSize:"18px", fontWeight:"800", color:"#F1F5F9" }}>What-If Scenarios</h2>
              <button style={{ background:"#1D4ED8", border:"none", color:"#fff", padding:"8px 18px",
                borderRadius:"6px", fontSize:"13px", cursor:"pointer", fontWeight:"700" }}>+ New Scenario</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:"12px", marginBottom:"18px" }}>
              {mockData.scenarios.map((s, i) => (
                <div key={i} onClick={() => setSelectedScenario(i)}
                  style={{ background:"#161B2E", border:`2px solid ${selectedScenario===i?"#3B82F6":"#1E2D4A"}`,
                    borderRadius:"10px", padding:"16px", cursor:"pointer" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <div style={{ fontSize:"14px", fontWeight:"800", color:"#E2E8F0" }}>{s.name}</div>
                      <div style={{ fontSize:"11px", color:"#64748B", marginTop:"2px" }}>Created: {s.date}</div>
                    </div>
                    <span style={{ fontSize:"10px", padding:"3px 8px", borderRadius:"4px", fontWeight:"700",
                      background: s.status==="Active"?"#10B98122":s.status==="Approved"?"#3B82F622":"#1E2D4A",
                      color: s.status==="Active"?"#10B981":s.status==="Approved"?"#60A5FA":"#94A3B8" }}>{s.status}</span>
                  </div>
                  {s.delta !== "—"
                    ? <div style={{ marginTop:"10px", fontSize:"24px", fontWeight:"900", color: s.delta.startsWith("+")?"#10B981":"#EF4444" }}>{s.delta}</div>
                    : <div style={{ marginTop:"10px", fontSize:"12px", color:"#64748B" }}>Reference plan · No delta</div>
                  }
                </div>
              ))}
            </div>
            <div style={{ background:"#161B2E", border:"1px solid #1E2D4A", borderRadius:"10px", padding:"18px" }}>
              <h3 style={{ margin:"0 0 14px", fontSize:"14px", fontWeight:"700", color:"#E2E8F0" }}>Comparison: {mockData.scenarios[selectedScenario].name}</h3>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:"10px" }}>
                {[
                  ["Fulfillment Rate","94.2%", selectedScenario===1?"89.1%":selectedScenario===2?"81.4%":selectedScenario===3?"96.3%":"94.2%"],
                  ["Revenue Impact","$0", mockData.scenarios[selectedScenario].delta==="—"?"Baseline":mockData.scenarios[selectedScenario].delta],
                  ["Total Demand","14,200 units", selectedScenario===1?"16,330 units":"14,200 units"],
                ].map(([label, base, scenario], i) => (
                  <div key={i} style={{ background:"#0F1117", borderRadius:"8px", padding:"14px" }}>
                    <div style={{ fontSize:"10px", color:"#64748B", fontWeight:"700", textTransform:"uppercase", marginBottom:"10px" }}>{label}</div>
                    <div style={{ display:"flex", gap:"20px" }}>
                      <div>
                        <div style={{ fontSize:"9px", color:"#475569" }}>Baseline</div>
                        <div style={{ fontSize:"15px", fontWeight:"700", color:"#94A3B8" }}>{base}</div>
                      </div>
                      <div>
                        <div style={{ fontSize:"9px", color:"#475569" }}>Scenario</div>
                        <div style={{ fontSize:"15px", fontWeight:"700", color:"#60A5FA" }}>{scenario}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* SME SCENARIO TAB */}
        {activeTab === "sme-scenarios" && <SMEScenarioTab />}

        {/* ABC TAB */}
        {activeTab === "abc" && <ABCTab />}

      </div>

      {/* AI CHAT */}
      {chatOpen && (
        <div style={{ position:"fixed", bottom:0, right:0, width:"340px", height:"480px", background:"#161B2E",
          borderTop:"1px solid #1E2D4A", borderLeft:"1px solid #1E2D4A", borderRadius:"12px 0 0 0",
          display:"flex", flexDirection:"column", zIndex:200, boxShadow:"0 -4px 30px #0008" }}>
          <div style={{ padding:"12px 16px", borderBottom:"1px solid #1E2D4A", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:"14px", fontWeight:"800", color:"#E2E8F0" }}>🤖 AI Assistant</div>
              <div style={{ fontSize:"10px", color:"#10B981" }}>● Connected to live data</div>
            </div>
            <button onClick={() => setChatOpen(false)} style={{ background:"#1E2D4A", border:"none", color:"#94A3B8",
              cursor:"pointer", fontSize:"18px", width:"30px", height:"30px", borderRadius:"6px" }}>×</button>
          </div>
          <div style={{ flex:1, overflow:"auto", padding:"12px", display:"flex", flexDirection:"column", gap:"10px" }}>
            {chatMessages.map((msg, i) => (
              <div key={i} style={{ display:"flex", justifyContent: msg.role==="user"?"flex-end":"flex-start" }}>
                <div style={{ maxWidth:"85%", padding:"10px 13px",
                  borderRadius: msg.role==="user"?"14px 14px 2px 14px":"14px 14px 14px 2px",
                  background: msg.role==="user"?"#1D4ED8":"#1E2D4A",
                  fontSize:"12px", color:"#E2E8F0", lineHeight:"1.6" }}>
                  {msg.text}
                </div>
              </div>
            ))}
            {aiLoading && (
              <div style={{ display:"flex" }}>
                <div style={{ padding:"10px 13px", borderRadius:"14px 14px 14px 2px",
                  background:"#1E2D4A", fontSize:"12px", color:"#64748B" }}>Analyzing data...</div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <div style={{ padding:"12px", borderTop:"1px solid #1E2D4A" }}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"8px" }}>
              {["Show critical items","ABC Class A policy","Best SME scenario?"].map(q => (
                <button key={q} onClick={() => setChatInput(q)}
                  style={{ background:"#0F1117", border:"1px solid #1E2D4A", color:"#60A5FA",
                    padding:"4px 10px", borderRadius:"20px", fontSize:"10px", cursor:"pointer", fontWeight:"600" }}>{q}</button>
              ))}
            </div>
            <div style={{ display:"flex", gap:"8px" }}>
              <input value={chatInput} onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => e.key==="Enter" && sendChat()}
                placeholder="Ask about your supply chain..."
                style={{ flex:1, background:"#0F1117", border:"1px solid #1E2D4A", color:"#E2E8F0",
                  padding:"9px 12px", borderRadius:"8px", fontSize:"12px", outline:"none" }} />
              <button onClick={sendChat} disabled={aiLoading}
                style={{ background:"#1D4ED8", border:"none", color:"#fff", padding:"9px 14px",
                  borderRadius:"8px", cursor:"pointer", fontSize:"15px", opacity: aiLoading?0.5:1 }}>→</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
